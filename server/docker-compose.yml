services:
  aibadges-backend:
    build: .
    container_name: aibadges-backend
    restart: unless-stopped
    # Bound to localhost only; public ingress is via Caddy (aibadges-api.mindmaterial.io).
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      - PORT=8095
      - DB_PATH=/data/aibadges.db
      # Optional. Leave empty for permissionless registration (anyone can push/share a badge);
      # set it (and the matching client WXT_AIBADGES_INVITE) to gate first-time registration.
      - INVITE_TOKEN=${INVITE_TOKEN:-}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8095/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
